<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="720" viewBox="0 0 1500 720" font-family="Inter, Helvetica, Arial, sans-serif">
  <style>
    @keyframes dash-flow { to { stroke-dashoffset: 0; } }
    .title { font-size: 34px; font-weight: 700; fill: #172033; text-anchor: middle; }
    .subtitle { font-size: 16px; fill: #64748b; text-anchor: middle; }
    .card-title { font-size: 22px; font-weight: 700; fill: #172033; text-anchor: middle; }
    .card-sub { font-size: 16px; fill: #475569; text-anchor: middle; }
    .card-code { font: 14px Menlo, Consolas, monospace; fill: #334155; text-anchor: middle; }
    .edge-label { font-size: 15px; font-weight: 600; fill: #475569; text-anchor: middle; }
    .note { font-size: 14px; fill: #64748b; text-anchor: middle; font-style: italic; }
    .edge { stroke: #64748b; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 9 8; stroke-dashoffset: -17; animation: dash-flow 700ms linear infinite; fill: none; }
  </style>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#94a3b8" flood-opacity="0.18"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/></marker>
  </defs>

  <rect width="1500" height="720" fill="#fbfdff"/>
  <text class="title" x="750" y="52">Grafana Datasource Provisioning</text>
  <text class="subtitle" x="750" y="82">Host YAML to live Explore query</text>

  <g id="file-card" filter="url(#shadow)">
    <rect x="80" y="140" width="320" height="210" rx="24" fill="#eef6ff" stroke="#93c5fd" stroke-width="1.8"/>
    <text class="card-title" x="240" y="200">Provisioning file</text>
    <text class="card-sub" x="240" y="232">on the host</text>
    <text class="card-code" x="240" y="270">grafana/</text>
    <text class="card-code" x="240" y="290">provisioning/</text>
    <text class="card-code" x="240" y="310">datasources/tempo.yaml</text>
    <text class="card-sub" x="240" y="335" font-style="italic">Author YAML</text>
  </g>

  <g id="container-card" filter="url(#shadow)">
    <rect x="1100" y="140" width="320" height="210" rx="24" fill="#f4f0ff" stroke="#c4b5fd" stroke-width="1.8"/>
    <text class="card-title" x="1260" y="200">Grafana container</text>
    <text class="card-sub" x="1260" y="232">startup scan</text>
    <text class="card-code" x="1260" y="270">/etc/grafana/</text>
    <text class="card-code" x="1260" y="290">provisioning/</text>
    <text class="card-code" x="1260" y="310">datasources/*.yaml</text>
    <text class="card-sub" x="1260" y="335" font-style="italic">Parse and load</text>
  </g>

  <g id="registered-card" filter="url(#shadow)">
    <rect x="1100" y="430" width="320" height="210" rx="24" fill="#fdf4ff" stroke="#f0abfc" stroke-width="1.8"/>
    <text class="card-title" x="1260" y="490">Datasource registered</text>
    <text class="card-sub" x="1260" y="522">in Grafana data layer</text>
    <text class="card-code" x="1260" y="560">name: Tempo</text>
    <text class="card-code" x="1260" y="580">type: tempo</text>
    <text class="card-code" x="1260" y="600">url: http://tempo:3200</text>
    <text class="card-sub" x="1260" y="625" font-style="italic">Available in Explore</text>
  </g>

  <g id="explore-card" filter="url(#shadow)">
    <rect x="80" y="430" width="320" height="210" rx="24" fill="#fff6e8" stroke="#fdba74" stroke-width="1.8"/>
    <text class="card-title" x="240" y="490">Explore UI</text>
    <text class="card-sub" x="240" y="522">browser at :3000</text>
    <text class="card-code" x="240" y="560">http://localhost:3000</text>
    <text class="card-code" x="240" y="580">query by trace ID</text>
    <text class="card-sub" x="240" y="605" font-style="italic">Run query</text>
  </g>

  <!-- Arrow 1: file → container (top row, horizontal) -->
  <line class="edge" x1="400" y1="245" x2="1092" y2="245" marker-end="url(#arrow)"/>
  <rect x="700" y="218" width="92" height="27" rx="13" fill="#fbfdff"/>
  <text class="edge-label" x="746" y="237">mount :ro</text>

  <!-- Arrow 2: container → registered (vertical drop down the right column) -->
  <line class="edge" x1="1260" y1="350" x2="1260" y2="422" marker-end="url(#arrow)"/>
  <rect x="1280" y="376" width="80" height="27" rx="13" fill="#fbfdff"/>
  <text class="edge-label" x="1320" y="395">register</text>

  <!-- Arrow 3: registered → explore (bottom row, right to left) -->
  <line class="edge" x1="1100" y1="535" x2="408" y2="535" marker-end="url(#arrow)"/>
  <rect x="710" y="508" width="80" height="27" rx="13" fill="#fbfdff"/>
  <text class="edge-label" x="750" y="527">select</text>

  <text class="note" x="750" y="688">No UI clicks required — the datasource appears on every container restart.</text>

  <mxfile host="app.diagrams.net" type="device">
    <diagram name="Provisioning Flow" id="lab9-provisioning">
      <mxGraphModel dx="1500" dy="720" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1500" pageHeight="720" math="0" shadow="1">
        <root>
          <mxCell id="0"/><mxCell id="1" parent="0"/>
          <mxCell id="title" value="Grafana Datasource Provisioning" style="text;html=1;align=center;verticalAlign=middle;fontSize=34;fontStyle=1;fontColor=#172033;" vertex="1" parent="1"><mxGeometry x="430" y="22" width="640" height="46" as="geometry"/></mxCell>
          <mxCell id="subtitle" value="Host YAML to live Explore query" style="text;html=1;align=center;verticalAlign=middle;fontSize=16;fontColor=#64748b;" vertex="1" parent="1"><mxGeometry x="500" y="66" width="500" height="28" as="geometry"/></mxCell>
          <mxCell id="file" value="Provisioning file&#10;&#10;on the host&#10;&#10;grafana/provisioning/&#10;datasources/tempo.yaml&#10;&#10;Author YAML" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#eef6ff;strokeColor=#93c5fd;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;fontStyle=0;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="80" y="140" width="320" height="210" as="geometry"/></mxCell>
          <mxCell id="container" value="Grafana container&#10;&#10;startup scan&#10;&#10;/etc/grafana/provisioning/&#10;datasources/*.yaml&#10;&#10;Parse and load" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#f4f0ff;strokeColor=#c4b5fd;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;fontStyle=0;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="1100" y="140" width="320" height="210" as="geometry"/></mxCell>
          <mxCell id="registered" value="Datasource registered&#10;&#10;in Grafana data layer&#10;&#10;name: Tempo&#10;type: tempo&#10;url: http://tempo:3200&#10;&#10;Available in Explore" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#fdf4ff;strokeColor=#f0abfc;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;fontStyle=0;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="1100" y="430" width="320" height="210" as="geometry"/></mxCell>
          <mxCell id="explore" value="Explore UI&#10;&#10;browser at :3000&#10;&#10;http://localhost:3000&#10;query by trace ID&#10;&#10;Run query" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#fff6e8;strokeColor=#fdba74;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;fontStyle=0;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="80" y="430" width="320" height="210" as="geometry"/></mxCell>
          <mxCell id="mount" value="mount :ro" style="edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;endArrow=classic;strokeColor=#64748b;strokeWidth=2;dashed=1;fontSize=15;fontStyle=1;fontColor=#475569;labelBackgroundColor=#fbfdff;" edge="1" parent="1" source="file" target="container"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="register" value="register" style="edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;endArrow=classic;strokeColor=#64748b;strokeWidth=2;dashed=1;fontSize=15;fontStyle=1;fontColor=#475569;labelBackgroundColor=#fbfdff;" edge="1" parent="1" source="container" target="registered"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="select" value="select" style="edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;endArrow=classic;strokeColor=#64748b;strokeWidth=2;dashed=1;fontSize=15;fontStyle=1;fontColor=#475569;labelBackgroundColor=#fbfdff;" edge="1" parent="1" source="registered" target="explore"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="note" value="No UI clicks required — the datasource appears on every container restart." style="text;html=1;align=center;verticalAlign=middle;fontSize=14;fontColor=#64748b;fontStyle=2;" vertex="1" parent="1"><mxGeometry x="350" y="668" width="800" height="28" as="geometry"/></mxCell>
        </root>
      </mxGraphModel>
    </diagram>
  </mxfile>
</svg>