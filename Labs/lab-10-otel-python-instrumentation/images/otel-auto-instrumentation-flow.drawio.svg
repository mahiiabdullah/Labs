<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="760" viewBox="0 0 1500 760" font-family="Inter, Helvetica, Arial, sans-serif">
  <style>
    @keyframes dash-flow { to { stroke-dashoffset: 0; } }
    .title { font-size: 34px; font-weight: 700; fill: #172033; text-anchor: middle; }
    .subtitle { font-size: 16px; fill: #64748b; text-anchor: middle; }
    .card-title { font-size: 22px; font-weight: 700; fill: #172033; text-anchor: middle; }
    .card-sub { font-size: 16px; fill: #475569; text-anchor: middle; }
    .card-code { font: 14px Menlo, Consolas, monospace; fill: #334155; text-anchor: middle; }
    .edge-label { font-size: 15px; font-weight: 600; fill: #475569; text-anchor: middle; }
    .note { font-size: 14px; fill: #64748b; text-anchor: middle; font-style: italic; }
    .edge { stroke: #64748b; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 9 8; stroke-dashoffset: -17; animation: dash-flow 700ms linear infinite; fill: none; }
  </style>
  <defs>
    <filter id="shadow" x="-15%" y="-15%" width="130%" height="140%"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#94a3b8" flood-opacity="0.18"/></filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0 L10 5 L0 10 Z" fill="#64748b"/></marker>
  </defs>

  <rect width="1500" height="760" fill="#fbfdff"/>
  <text class="title" x="750" y="52">OpenTelemetry Auto-Instrumentation Flow</text>
  <text class="subtitle" x="750" y="82">Spans emitted without any tracing code in your application</text>

  <g id="app-card" filter="url(#shadow)">
    <rect x="70" y="160" width="290" height="200" rx="24" fill="#eef6ff" stroke="#93c5fd" stroke-width="1.8"/>
    <text class="card-title" x="215" y="220">Flask application</text>
    <text class="card-sub" x="215" y="252">incoming HTTP request</text>
    <text class="card-code" x="215" y="295">GET /hello</text>
    <text class="card-sub" x="215" y="335" font-style="italic">Receive request</text>
  </g>

  <g id="wrapper-card" filter="url(#shadow)">
    <rect x="490" y="160" width="290" height="200" rx="24" fill="#f4f0ff" stroke="#c4b5fd" stroke-width="1.8"/>
    <text class="card-title" x="635" y="220">Instrumentation wrapper</text>
    <text class="card-sub" x="635" y="252">patches Flask at startup</text>
    <text class="card-code" x="635" y="295">opentelemetry-instrument</text>
    <text class="card-sub" x="635" y="335" font-style="italic">Create server span</text>
  </g>

  <g id="exporter-card" filter="url(#shadow)">
    <rect x="910" y="160" width="290" height="200" rx="24" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.8"/>
    <text class="card-title" x="1055" y="220">OTLP HTTP exporter</text>
    <text class="card-sub" x="1055" y="252">batches completed spans</text>
    <text class="card-code" x="1055" y="295">POST /v1/traces</text>
    <text class="card-sub" x="1055" y="335" font-style="italic">Export span</text>
  </g>

  <g id="tempo-card" filter="url(#shadow)">
    <rect x="910" y="500" width="290" height="200" rx="24" fill="#fdf4ff" stroke="#f0abfc" stroke-width="1.8"/>
    <text class="card-title" x="1055" y="560">Tempo</text>
    <text class="card-sub" x="1055" y="592">OTLP receiver and storage</text>
    <text class="card-code" x="1055" y="635">endpoint :4318</text>
    <text class="card-sub" x="1055" y="675" font-style="italic">Index and persist</text>
  </g>

  <g id="grafana-card" filter="url(#shadow)">
    <rect x="490" y="500" width="290" height="200" rx="24" fill="#fff6e8" stroke="#fdba74" stroke-width="1.8"/>
    <text class="card-title" x="635" y="560">Grafana Explore</text>
    <text class="card-sub" x="635" y="592">Tempo datasource</text>
    <text class="card-code" x="635" y="635">service.name = my-api</text>
    <text class="card-sub" x="635" y="675" font-style="italic">Find and inspect trace</text>
  </g>

  <!-- Arrow 1: app → wrapper -->
  <line class="edge" x1="360" y1="260" x2="482" y2="260" marker-end="url(#arrow)"/>
  <rect x="375" y="234" width="92" height="27" rx="13" fill="#fbfdff"/>
  <text class="edge-label" x="421" y="253">import hook</text>

  <!-- Arrow 2: wrapper → exporter -->
  <line class="edge" x1="780" y1="260" x2="902" y2="260" marker-end="url(#arrow)"/>
  <rect x="798" y="234" width="86" height="27" rx="13" fill="#fbfdff"/>
  <text class="edge-label" x="841" y="253">span batch</text>

  <!-- Arrow 3: exporter → tempo (vertical drop) -->
  <line class="edge" x1="1055" y1="360" x2="1055" y2="492" marker-end="url(#arrow)"/>
  <rect x="1075" y="408" width="118" height="27" rx="13" fill="#fbfdff"/>
  <text class="edge-label" x="1134" y="427">http/protobuf</text>

  <!-- Arrow 4: tempo → grafana (right to left along bottom row) -->
  <line class="edge" x1="910" y1="600" x2="788" y2="600" marker-end="url(#arrow)"/>
  <rect x="804" y="574" width="92" height="27" rx="13" fill="#fbfdff"/>
  <text class="edge-label" x="850" y="593">query :3200</text>

  <text class="note" x="750" y="738">The wrapper and exporter are configured through standard OTEL_* environment variables — no application tracing code is required.</text>

  <mxfile host="app.diagrams.net" type="device">
    <diagram name="OTel Flow" id="lab10-otel-flow">
      <mxGraphModel dx="1500" dy="760" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1500" pageHeight="760" math="0" shadow="1">
        <root>
          <mxCell id="0"/><mxCell id="1" parent="0"/>
          <mxCell id="title" value="OpenTelemetry Auto-Instrumentation Flow" style="text;html=1;align=center;verticalAlign=middle;fontSize=34;fontStyle=1;fontColor=#172033;" vertex="1" parent="1"><mxGeometry x="370" y="22" width="760" height="46" as="geometry"/></mxCell>
          <mxCell id="subtitle" value="Spans emitted without any tracing code in your application" style="text;html=1;align=center;verticalAlign=middle;fontSize=16;fontColor=#64748b;" vertex="1" parent="1"><mxGeometry x="350" y="66" width="800" height="28" as="geometry"/></mxCell>
          <mxCell id="app" value="Flask application&#10;&#10;incoming HTTP request&#10;&#10;GET /hello&#10;&#10;Receive request" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#eef6ff;strokeColor=#93c5fd;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="70" y="160" width="290" height="200" as="geometry"/></mxCell>
          <mxCell id="wrapper" value="Instrumentation wrapper&#10;&#10;patches Flask at startup&#10;&#10;opentelemetry-instrument&#10;&#10;Create server span" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#f4f0ff;strokeColor=#c4b5fd;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="490" y="160" width="290" height="200" as="geometry"/></mxCell>
          <mxCell id="exporter" value="OTLP HTTP exporter&#10;&#10;batches completed spans&#10;&#10;POST /v1/traces&#10;&#10;Export span" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#ecfeff;strokeColor=#67e8f9;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="910" y="160" width="290" height="200" as="geometry"/></mxCell>
          <mxCell id="tempo" value="Tempo&#10;&#10;OTLP receiver and storage&#10;&#10;endpoint :4318&#10;&#10;Index and persist" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#fdf4ff;strokeColor=#f0abfc;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="910" y="500" width="290" height="200" as="geometry"/></mxCell>
          <mxCell id="grafana" value="Grafana Explore&#10;&#10;Tempo datasource&#10;&#10;service.name = my-api&#10;&#10;Find and inspect trace" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#fff6e8;strokeColor=#fdba74;strokeWidth=2;fontSize=17;fontColor=#172033;align=center;verticalAlign=middle;arcSize=12;shadow=1;" vertex="1" parent="1"><mxGeometry x="490" y="500" width="290" height="200" as="geometry"/></mxCell>
          <mxCell id="hook" value="import hook" style="edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;endArrow=classic;strokeColor=#64748b;strokeWidth=2;dashed=1;fontSize=15;fontStyle=1;fontColor=#475569;labelBackgroundColor=#fbfdff;" edge="1" parent="1" source="app" target="wrapper"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="batch" value="span batch" style="edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;endArrow=classic;strokeColor=#64748b;strokeWidth=2;dashed=1;fontSize=15;fontStyle=1;fontColor=#475569;labelBackgroundColor=#fbfdff;" edge="1" parent="1" source="wrapper" target="exporter"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="proto" value="http/protobuf" style="edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;endArrow=classic;strokeColor=#64748b;strokeWidth=2;dashed=1;fontSize=15;fontStyle=1;fontColor=#475569;labelBackgroundColor=#fbfdff;" edge="1" parent="1" source="exporter" target="tempo"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="query" value="query :3200" style="edgeStyle=orthogonalEdgeStyle;rounded=1;html=1;endArrow=classic;strokeColor=#64748b;strokeWidth=2;dashed=1;fontSize=15;fontStyle=1;fontColor=#475569;labelBackgroundColor=#fbfdff;" edge="1" parent="1" source="tempo" target="grafana"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="note" value="The wrapper and exporter are configured through standard OTEL_* environment variables — no application tracing code is required." style="text;html=1;align=center;verticalAlign=middle;fontSize=14;fontColor=#64748b;fontStyle=2;" vertex="1" parent="1"><mxGeometry x="180" y="718" width="1140" height="28" as="geometry"/></mxCell>
        </root>
      </mxGraphModel>
    </diagram>
  </mxfile>
</svg>