<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="700" viewBox="0 0 1480 700" font-family="Helvetica, Arial, sans-serif">
  <style>
    @keyframes dash-flow { to { stroke-dashoffset: 0; } }
    .title { font-size: 32px; font-weight: 600; fill: #1a1a1a; text-anchor: middle; }
    .box-label { font-size: 22px; font-weight: 500; fill: #1a1a1a; text-anchor: middle; }
    .box-sub { font-size: 16px; fill: #555555; text-anchor: middle; }
    .box-code { font-family: Menlo, Consolas, monospace; font-size: 14px; fill: #444444; text-anchor: middle; }
    .arrow-label { font-size: 16px; fill: #333333; text-anchor: middle; }
    .step { font-size: 14px; fill: #777777; text-anchor: middle; }
    .note { font-size: 14px; fill: #555555; text-anchor: middle; font-style: italic; }
    .edge { stroke: #333333; stroke-width: 2; stroke-dasharray: 8; stroke-dashoffset: -16; animation: dash-flow 600ms linear 0s infinite normal none running; fill: none; }
  </style>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#333333"/>
    </marker>
  </defs>

  <text class="title" x="740" y="50">OpenTelemetry Auto-Instrumentation Flow</text>

  <g id="preview-app">
    <rect x="50" y="130" width="260" height="190" rx="22" ry="22" fill="#f5f8ff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text class="box-label" x="180" y="180">Flask application</text>
    <text class="box-sub" x="180" y="210">incoming HTTP request</text>
    <text class="box-code" x="180" y="240">GET /hello</text>
    <text class="step" x="180" y="290">1. Receive request</text>
  </g>

  <g id="preview-wrapper">
    <rect x="480" y="130" width="300" height="190" rx="22" ry="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text class="box-label" x="630" y="180">Instrumentation wrapper</text>
    <text class="box-sub" x="630" y="210">patches Flask at startup</text>
    <text class="box-code" x="630" y="240">opentelemetry-instrument</text>
    <text class="step" x="630" y="290">2. Create server span</text>
  </g>

  <g id="preview-exporter">
    <rect x="950" y="130" width="280" height="190" rx="22" ry="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text class="box-label" x="1090" y="180">OTLP HTTP exporter</text>
    <text class="box-sub" x="1090" y="210">batches completed spans</text>
    <text class="box-code" x="1090" y="240">POST /v1/traces</text>
    <text class="step" x="1090" y="290">3. Export span</text>
  </g>

  <g id="preview-tempo">
    <rect x="950" y="430" width="280" height="190" rx="22" ry="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text class="box-label" x="1090" y="480">Tempo</text>
    <text class="box-sub" x="1090" y="510">OTLP receiver and storage</text>
    <text class="box-code" x="1090" y="540">endpoint :4318</text>
    <text class="step" x="1090" y="590">4. Index and persist</text>
  </g>

  <g id="preview-grafana">
    <rect x="480" y="430" width="300" height="190" rx="22" ry="22" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <text class="box-label" x="630" y="480">Grafana Explore</text>
    <text class="box-sub" x="630" y="510">Tempo datasource</text>
    <text class="box-code" x="630" y="540">service.name = my-api</text>
    <text class="step" x="630" y="590">5. Find and inspect trace</text>
  </g>

  <line class="edge" x1="310" y1="225" x2="472" y2="225" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="391" y="213">import hook</text>

  <line class="edge" x1="780" y1="225" x2="942" y2="225" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="861" y="213">span batch</text>

  <line class="edge" x1="1090" y1="320" x2="1090" y2="422" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="1160" y="376">http/protobuf</text>

  <line class="edge" x1="950" y1="525" x2="788" y2="525" marker-end="url(#arrow)"/>
  <text class="arrow-label" x="869" y="513">query :3200</text>

  <text class="note" x="740" y="675">The wrapper and exporter are configured through standard OTEL_* environment variables—no application tracing code is required.</text>

  <mxfile host="app.diagrams.net" type="device">
    <diagram name="OTel Flow" id="otel-1">
      <mxGraphModel dx="1480" dy="700" grid="1" gridSize="10" guides="1" tooltips="1" connect="1" arrows="1" fold="1" page="1" pageScale="1" pageWidth="1480" pageHeight="700" math="0" shadow="0">
        <root>
          <mxCell id="0"/>
          <mxCell id="1" parent="0"/>
          <mxCell id="2" value="OpenTelemetry Auto-Instrumentation Flow" style="text;html=1;align=center;verticalAlign=middle;fontSize=32;fontColor=#1a1a1a;" vertex="1" parent="1"><mxGeometry x="440" y="20" width="600" height="50" as="geometry"/></mxCell>
          <mxCell id="3" value="Flask application&#10;incoming HTTP request&#10;&#10;GET /hello&#10;&#10;1. Receive request" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#f5f8ff;strokeColor=#1a1a1a;strokeWidth=1.5;fontSize=16;align=center;verticalAlign=middle;arcSize=10;" vertex="1" parent="1"><mxGeometry x="50" y="130" width="260" height="190" as="geometry"/></mxCell>
          <mxCell id="4" value="Instrumentation wrapper&#10;patches Flask at startup&#10;&#10;opentelemetry-instrument&#10;&#10;2. Create server span" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#1a1a1a;strokeWidth=1.5;fontSize=16;align=center;verticalAlign=middle;arcSize=10;" vertex="1" parent="1"><mxGeometry x="480" y="130" width="300" height="190" as="geometry"/></mxCell>
          <mxCell id="5" value="OTLP HTTP exporter&#10;batches completed spans&#10;&#10;POST /v1/traces&#10;&#10;3. Export span" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#1a1a1a;strokeWidth=1.5;fontSize=16;align=center;verticalAlign=middle;arcSize=10;" vertex="1" parent="1"><mxGeometry x="950" y="130" width="280" height="190" as="geometry"/></mxCell>
          <mxCell id="6" value="Tempo&#10;OTLP receiver and storage&#10;&#10;endpoint :4318&#10;&#10;4. Index and persist" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#1a1a1a;strokeWidth=1.5;fontSize=16;align=center;verticalAlign=middle;arcSize=10;" vertex="1" parent="1"><mxGeometry x="950" y="430" width="280" height="190" as="geometry"/></mxCell>
          <mxCell id="7" value="Grafana Explore&#10;Tempo datasource&#10;&#10;service.name = my-api&#10;&#10;5. Find and inspect trace" style="rounded=1;whiteSpace=wrap;html=1;fillColor=#ffffff;strokeColor=#1a1a1a;strokeWidth=1.5;fontSize=16;align=center;verticalAlign=middle;arcSize=10;" vertex="1" parent="1"><mxGeometry x="480" y="430" width="300" height="190" as="geometry"/></mxCell>
          <mxCell id="8" value="import hook" style="endArrow=classic;html=1;rounded=0;strokeColor=#333333;strokeWidth=2;dashed=1;fontSize=16;labelBackgroundColor=#ffffff;" edge="1" parent="1" source="3" target="4"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="9" value="span batch" style="endArrow=classic;html=1;rounded=0;strokeColor=#333333;strokeWidth=2;dashed=1;fontSize=16;labelBackgroundColor=#ffffff;" edge="1" parent="1" source="4" target="5"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="10" value="http/protobuf" style="endArrow=classic;html=1;rounded=0;strokeColor=#333333;strokeWidth=2;dashed=1;fontSize=16;labelBackgroundColor=#ffffff;" edge="1" parent="1" source="5" target="6"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="11" value="query :3200" style="endArrow=classic;html=1;rounded=0;strokeColor=#333333;strokeWidth=2;dashed=1;fontSize=16;labelBackgroundColor=#ffffff;" edge="1" parent="1" source="6" target="7"><mxGeometry relative="1" as="geometry"/></mxCell>
          <mxCell id="12" value="The wrapper and exporter are configured through standard OTEL_* environment variables—no application tracing code is required." style="text;html=1;align=center;verticalAlign=middle;fontSize=14;fontColor=#555555;fontStyle=2;" vertex="1" parent="1"><mxGeometry x="180" y="650" width="1120" height="30" as="geometry"/></mxCell>
        </root>
      </mxGraphModel>
    </diagram>
  </mxfile>
</svg>
